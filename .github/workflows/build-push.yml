name: Build and Push UBI Tomcat Image

on:
  workflow_dispatch:
    inputs:
      ubi_version:
        description: "UBI Version"
        required: true
        default: "9"

      tomcat_major:
        description: "Tomcat Major Version (9 or 10)"
        required: true
        default: "9"

      java_version:
        description: "Java Version (11, 17, 21)"
        required: true
        default: "17"

      image_name:
        description: "Docker Image Name"
        required: true
        default: "ubi-tomcat"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # Visual Workflow Diagram
      # ==========================================
      - name: Display Workflow Diagram
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          # UBI Tomcat Docker Build Workflow

          ## CI/CD Pipeline Diagram

          ```mermaid
          flowchart TD

            A[Start Workflow]
            --> B[Checkout Source]
            --> C[Detect Tomcat Version]
            --> D[Set Java Version]
            --> E[Docker Hub Login]
            --> F[Build Docker Image]
            --> G[Push Docker Image]
            --> H[Docker Hub Registry]

          ```
          EOF

      # ==========================================
      # Checkout Repository
      # ==========================================
      - name: Checkout Source
        uses: actions/checkout@v4

      # ==========================================
      # Detect Latest Tomcat Version
      # ==========================================
      - name: Detect Latest Tomcat Version
        run: |
          MAJOR=${{ github.event.inputs.tomcat_major }}

          VERSION=$(curl -s https://downloads.apache.org/tomcat/tomcat-$MAJOR/ \
            | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' \
            | sort -V \
            | tail -1)

          echo "TOMCAT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "TOMCAT_MAJOR=$MAJOR" >> $GITHUB_ENV

          echo "Detected Tomcat Version: $VERSION"

      # ==========================================
      # Set Java Version
      # ==========================================
      - name: Set Java Version
        run: |
          echo "JAVA_VERSION=${{ github.event.inputs.java_version }}" >> $GITHUB_ENV

      # ==========================================
      # Docker Hub Login
      # ==========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # Build Docker Image
      # ==========================================
      - name: Build Docker Image
        run: |
          docker build \
            --progress=plain \
            --no-cache \
            --build-arg UBI_VERSION=${{ github.event.inputs.ubi_version }} \
            --build-arg TOMCAT_MAJOR=$TOMCAT_MAJOR \
            --build-arg TOMCAT_VERSION=$TOMCAT_VERSION \
            --build-arg JAVA_VERSION=$JAVA_VERSION \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest \
            .

      # ==========================================
      # Push Docker Image
      # ==========================================
      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest

      # ==========================================
      # Build Summary
      # ==========================================
      - name: Build Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| UBI Version | ${{ github.event.inputs.ubi_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tomcat Major | $TOMCAT_MAJOR |" >> $GITHUB_STEP_SUMMARY
          echo "| Tomcat Version | $TOMCAT_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Java Version | $JAVA_VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Name | ${{ github.event.inputs.image_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Repository | ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest |" >> $GITHUB_STEP_SUMMARY
