name: Build and Push UBI Tomcat Image

on:
  workflow_dispatch:
    inputs:
      ubi_version:
        description: "UBI Version"
        required: true
        default: "9"

      tomcat_major:
        description: "Tomcat Major Version"
        required: true
        default: "9"

      java_version:
        description: "Java Version"
        required: true
        default: "17"

      image_name:
        description: "Docker Image Name"
        required: true
        default: "ubi-tomcat"

jobs:

  # ==========================================
  # START WORKFLOW
  # ==========================================
  start:
    name: Start Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Initialize Pipeline
        run: |
          echo "======================================"
          echo "Starting Docker CI/CD Pipeline"
          echo "======================================"

      # ==========================================
      # VISUAL PIPELINE DIAGRAM
      # ==========================================
      - name: Display Workflow Diagram
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          # UBI Tomcat Docker Build Workflow

          ## CI/CD Pipeline Diagram

          ```mermaid
          flowchart LR

            A([START])
            --> B[Checkout Source]
            --> C[Detect UBI Version]
            --> D[Detect Tomcat Version]
            --> E[Set Java Version]
            --> F[Build Docker Image]
            --> G[Docker Hub Login]
            --> H[Push Docker Image]
            --> I[Update Config Repository]
            --> J([COMPLETE])

          ```
          EOF

  # ==========================================
  # CHECKOUT SOURCE
  # ==========================================
  checkout-source:
    name: Checkout Source
    runs-on: ubuntu-latest
    needs: start

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  # ==========================================
  # DETECT UBI VERSION
  # ==========================================
  detect-ubi:
    name: Detect UBI Version
    runs-on: ubuntu-latest
    needs: checkout-source

    outputs:
      ubi_version: ${{ steps.detect.outputs.ubi_version }}

    steps:
      - name: Detect UBI Version
        id: detect
        shell: bash
        run: |
          set -e

          UBI_VERSION="${{ github.event.inputs.ubi_version }}"

          echo "Detected UBI Version: $UBI_VERSION"

          echo "ubi_version=$UBI_VERSION" >> $GITHUB_OUTPUT

  # ==========================================
  # DETECT TOMCAT VERSION
  # ==========================================
  detect-tomcat:
    name: Detect Tomcat Version
    runs-on: ubuntu-latest
    needs: checkout-source

    outputs:
      tomcat_version: ${{ steps.detect.outputs.tomcat_version }}

    steps:
      - name: Detect Latest Tomcat Version
        id: detect
        shell: bash
        run: |
          set -e

          MAJOR="${{ github.event.inputs.tomcat_major }}"

          VERSION=$(curl -fsSL https://downloads.apache.org/tomcat/tomcat-${MAJOR}/ \
            | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' \
            | sed 's/^v//' \
            | sort -V \
            | tail -1)

          if [ -z "$VERSION" ]; then
            echo "Failed to detect Tomcat version"
            exit 1
          fi

          echo "Detected Tomcat Version: $VERSION"

          echo "tomcat_version=$VERSION" >> $GITHUB_OUTPUT

  # ==========================================
  # SET JAVA VERSION
  # ==========================================
  set-java:
    name: Configure Java
    runs-on: ubuntu-latest
    needs:
      - detect-ubi
      - detect-tomcat

    steps:
      - name: Display Java Version
        run: |
          echo "Java Version: ${{ github.event.inputs.java_version }}"

  # ==========================================
  # BUILD AND PUSH DOCKER IMAGE
  # ==========================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - detect-ubi
      - detect-tomcat
      - set-java

    steps:

      # ==========================================
      # CHECKOUT REPOSITORY
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # DISPLAY BUILD PARAMETERS
      # ==========================================
      - name: Display Build Parameters
        run: |
          echo "======================================"
          echo "BUILD PARAMETERS"
          echo "======================================"

          echo "UBI Version       : ${{ needs.detect-ubi.outputs.ubi_version }}"
          echo "Tomcat Major      : ${{ github.event.inputs.tomcat_major }}"
          echo "Tomcat Version    : ${{ needs.detect-tomcat.outputs.tomcat_version }}"
          echo "Java Version      : ${{ github.event.inputs.java_version }}"
          echo "Image Name        : ${{ github.event.inputs.image_name }}"

      # ==========================================
      # BUILD DOCKER IMAGE
      # ==========================================
      - name: Build Docker Image
        run: |
          docker build \
            --progress=plain \
            --no-cache \
            --build-arg UBI_VERSION=${{ needs.detect-ubi.outputs.ubi_version }} \
            --build-arg TOMCAT_MAJOR=${{ github.event.inputs.tomcat_major }} \
            --build-arg TOMCAT_VERSION=${{ needs.detect-tomcat.outputs.tomcat_version }} \
            --build-arg JAVA_VERSION=${{ github.event.inputs.java_version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest \
            .

      # ==========================================
      # VERIFY IMAGE
      # ==========================================
      - name: Verify Docker Image
        run: |
          echo "======================================"
          echo "LOCAL DOCKER IMAGES"
          echo "======================================"

          docker images

      # ==========================================
      # LOGIN TO DOCKER HUB
      # ==========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # PUSH DOCKER IMAGE
      # ==========================================
      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest

  # ==========================================
  # UPDATE CONFIGURATION REPOSITORY
  # ==========================================
  update-config:
    name: Update Build Configuration
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - detect-ubi
      - detect-tomcat

    steps:

      # ==========================================
      # CHECKOUT CONFIGURATION REPOSITORY
      # ==========================================
      - name: Checkout Configuration Repository
        uses: actions/checkout@v4
        with:
          repository: satishnaga1/configuration
          token: ${{ secrets.GH_PAT }}
          path: configuration

      # ==========================================
      # GENERATE IMAGE TAG
      # ==========================================
      - name: Generate Docker Image Tag
        run: |
          IMAGE_TAG="ubi${{ needs.detect-ubi.outputs.ubi_version }}-java${{ github.event.inputs.java_version }}-tomcat${{ github.event.inputs.tomcat_major }}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          echo "Generated Image Tag:"
          echo "$IMAGE_TAG"

     # ==========================================
# UPDATE BUILD IMAGES FILE
# ==========================================
- name: Update build-images.txt
  run: |
    FILE="configuration/tomcat/build-images.txt"

    mkdir -p configuration/tomcat
    touch $FILE

    IMAGE_TAG="ubi${{ needs.detect-ubi.outputs.ubi_version }}-java${{ github.event.inputs.java_version }}-tomcat${{ github.event.inputs.tomcat_major }}"

    NEW_IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest"

    # ==========================================
    # GET OLD IMAGE
    # ==========================================
    OLD_IMAGE=$(awk -v tag="$IMAGE_TAG" '
      $0 == tag {found=1}
      found && /Docker Image :/ {
        sub("Docker Image : ","")
        print
        exit
      }
    ' $FILE)

    # remove :latest from old image
    OLD_IMAGE_NO_LATEST=$(echo "$OLD_IMAGE" | sed 's/:latest//')

    # ==========================================
    # REMOVE OLD ENTRY
    # ==========================================
    awk -v tag="$IMAGE_TAG" '
      BEGIN {skip=0}

      $0 == tag {
        skip=1
        next
      }

      skip && /^======================================$/ {
        skip=0
        next
      }

      !skip {print}
    ' $FILE > temp.txt

    mv temp.txt $FILE

    # ==========================================
    # ADD UPDATED ENTRY
    # ==========================================
    {
      echo "======================================"
      echo "$IMAGE_TAG"
      echo "Docker Image : $NEW_IMAGE"

      if [ ! -z "$OLD_IMAGE_NO_LATEST" ]; then
        echo "Docker old image : $OLD_IMAGE_NO_LATEST"
      fi

      echo "Build Date : $(date)"
      echo "======================================"
      echo ""
    } >> $FILE

    echo "Updated build-images.txt"
    cat $FILE

      # ==========================================
      # COMMIT CHANGES
      # ==========================================
      - name: Commit Changes
        run: |
          cd configuration

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add tomcat/build-images.txt

          git commit -m "Updated Docker build image list" || echo "No changes to commit"

      # ==========================================
      # PUSH CHANGES
      # ==========================================
      - name: Push Changes
        run: |
          cd configuration

          git push

  # ==========================================
  # COMPLETE WORKFLOW
  # ==========================================
  complete:
    name: COMPLETE WORKFLOW
    runs-on: ubuntu-latest
    needs: update-config

    steps:
      - name: Pipeline Completed
        run: |
          echo "======================================"
          echo "DOCKER IMAGE SUCCESSFULLY PUSHED"
          echo "======================================"

          echo ""
          echo "Docker Image:"
          echo "${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest"
