name: Build and Push UBI Tomcat Imagetets

on:
  workflow_dispatch:
    inputs:
      ubi_version:
        description: "UBI Version"
        required: true
        default: "9"

      tomcat_major:
        description: "Tomcat Major Version"
        required: true
        default: "9"

      java_version:
        description: "Java Version"
        required: true
        default: "17"

      image_name:
        description: "Docker Image Name"
        required: true
        default: "ubi-tomcat"

env:
  
  IMAGE_TAG: latest

jobs:

  # ==========================================
  # START WORKFLOW
  # ==========================================

  
  start:
    name: Start Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Initialize Pipeline
        run: |
          echo "Starting Docker CI/CD Pipeline"

  #==========================================
  ## VISUAL PIPELINE DIAGRAM
  #=========================================
      - name: Display Workflow Diagram
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          # UBI Tomcat Docker Build Workflow

          ## CI/CD Pipeline Diagram

          ```mermaid
          flowchart LR

            A([START])
            --> B[Checkout Source]
            --> C[Detect Tomcat Version]
            --> D[Set Java Version]
            --> E[Docker Hub Login]
            --> F[Build Docker Image]
            --> G[Push Docker Image]
          

          ```
          EOF

  # ==========================================
  # CHECKOUT SOURCE
  # ==========================================
  checkout-source:
    name: Checkout Source
    runs-on: ubuntu-latest
    needs: start

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  # ==========================================
  # DETECT TOMCAT VERSION
  # ==========================================
  detect-tomcat:
    name: Detect Tomcat Version
    runs-on: ubuntu-latest
    needs: checkout-source

    outputs:
      tomcat_version: ${{ steps.detect.outputs.tomcat_version }}

    steps:
      - name: Detect Latest Tomcat Version
        id: detect
        shell: bash
        run: |
          set -e

          MAJOR="${{ github.event.inputs.tomcat_major }}"

          VERSION=$(curl -fsSL https://downloads.apache.org/tomcat/tomcat-${MAJOR}/ \
            | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' \
            | sed 's/^v//' \
            | sort -V \
            | tail -1)

          if [ -z "$VERSION" ]; then
            echo "Failed to detect Tomcat version"
            exit 1
          fi

          echo "Detected Tomcat Version: $VERSION"

          echo "tomcat_version=$VERSION" >> $GITHUB_OUTPUT

  # ==========================================
  # SET JAVA VERSION
  # ==========================================
  set-java:
    name: Configure Java
    runs-on: ubuntu-latest
    needs: detect-tomcat

    steps:
      - name: Display Java Version
        run: |
          echo "Java Version: ${{ github.event.inputs.java_version }}"

  # ==========================================
  # DOCKER LOGIN
  # ==========================================
  docker-login:
    name: Docker Hub Login
    runs-on: ubuntu-latest
    needs: set-java

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

  # ==========================================
  # BUILD DOCKER IMAGE
  # ==========================================
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - docker-login
      - detect-tomcat

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Build Parameters
        run: |
          echo "UBI Version       : ${{ github.event.inputs.ubi_version }}"
          echo "Tomcat Major      : ${{ github.event.inputs.tomcat_major }}"
          echo "Tomcat Version    : ${{ needs.detect-tomcat.outputs.tomcat_version }}"
          echo "Java Version      : ${{ github.event.inputs.java_version }}"
          echo "Image Name        : ${{ github.event.inputs.image_name }}"

      - name: Verify Tomcat Download URL
        run: |
          URL="https://archive.apache.org/dist/tomcat/tomcat-${{ github.event.inputs.tomcat_major }}/v${{ needs.detect-tomcat.outputs.tomcat_version }}/bin/apache-tomcat-${{ needs.detect-tomcat.outputs.tomcat_version }}.tar.gz"

          echo "Testing URL:"
          echo "$URL"

          curl -I -f $URL

      - name: Build Docker Image
        run: |
          docker build \
            --progress=plain \
            --no-cache \
            --build-arg UBI_VERSION=${{ github.event.inputs.ubi_version }} \
            --build-arg TOMCAT_MAJOR=${{ github.event.inputs.tomcat_major }} \
            --build-arg TOMCAT_VERSION=${{ needs.detect-tomcat.outputs.tomcat_version }} \
            --build-arg JAVA_VERSION=${{ github.event.inputs.java_version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:${{ env.IMAGE_TAG }} \
            .

  # ==========================================
  # PUSH DOCKER IMAGE
  # ==========================================
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest
  # ==========================================
  # COMPLETE WORKFLOW
  # ==========================================
  complete:
    name: Complete Pipeline
    runs-on: ubuntu-latest
    needs: push-image

    steps:
      - name: Pipeline Completed
        run: |
          echo "Docker Image Successfully Published"

          echo ""
          echo "Image:"
          echo "${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:${{ env.IMAGE_TAG }}"
