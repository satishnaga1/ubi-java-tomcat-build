name: test

on:
  workflow_dispatch:
    inputs:
      ubi_version:
        description: "UBI Version"
        required: true
        default: "9"

      tomcat_major:
        description: "Tomcat Major Version"
        required: true
        default: "9"

      java_version:
        description: "Java Version"
        required: true
        default: "17"

      image_name:
        description: "Docker Image Name"
        required: true
        default: "ubi-tomcat"

jobs:

  # ==========================================
  # START WORKFLOW
  # ==========================================
  start:
    name: Start Workflow
    runs-on: ubuntu-latest

    steps:
      - name: Initialize Pipeline
        run: |
          echo "======================================"
          echo "Starting Docker CI/CD Pipeline"
          echo "======================================"

      - name: Display Workflow Diagram
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          # UBI Tomcat Docker Build Workflow

          ```mermaid
          flowchart LR

            A([START])
            --> B[Checkout Source]
            --> C[Detect UBI Version]
            --> D[Detect Tomcat Version]
            --> E[Set Java Version]
            --> F[Build Docker Image]
            --> G[Docker Login]
            --> H[Push Docker Image]
            --> I[Update Config Repository]
            --> J([COMPLETE])

          ```
          EOF

  # ==========================================
  # CHECKOUT SOURCE
  # ==========================================
  checkout-source:
    name: Checkout Source
    runs-on: ubuntu-latest
    needs: start

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  # ==========================================
  # DETECT UBI VERSION
  # ==========================================
  detect-ubi:
    name: Detect UBI Version
    runs-on: ubuntu-latest
    needs: checkout-source

    outputs:
      ubi_version: ${{ steps.detect.outputs.ubi_version }}

    steps:
      - name: Detect UBI Version
        id: detect
        run: |
          echo "ubi_version=${{ github.event.inputs.ubi_version }}" >> $GITHUB_OUTPUT

  # ==========================================
  # DETECT TOMCAT VERSION
  # ==========================================
  detect-tomcat:
    name: Detect Tomcat Version
    runs-on: ubuntu-latest
    needs: checkout-source

    outputs:
      tomcat_version: ${{ steps.detect.outputs.tomcat_version }}

    steps:
      - name: Detect Latest Tomcat Version
        id: detect
        shell: bash
        run: |
          set -e

          MAJOR="${{ github.event.inputs.tomcat_major }}"

          VERSION=$(curl -fsSL https://downloads.apache.org/tomcat/tomcat-${MAJOR}/ \
            | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' \
            | sed 's/^v//' \
            | sort -V \
            | tail -1)

          echo "Detected Tomcat Version: $VERSION"

          echo "tomcat_version=$VERSION" >> $GITHUB_OUTPUT

  # ==========================================
  # SET JAVA VERSION
  # ==========================================
  set-java:
    name: Configure Java
    runs-on: ubuntu-latest
    needs:
      - detect-ubi
      - detect-tomcat

    steps:
      - name: Display Java Version
        run: |
          echo "Java Version: ${{ github.event.inputs.java_version }}"

  # ==========================================
  # BUILD AND PUSH IMAGE
  # ==========================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - detect-ubi
      - detect-tomcat
      - set-java

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            --progress=plain \
            --no-cache \
            --build-arg UBI_VERSION=${{ needs.detect-ubi.outputs.ubi_version }} \
            --build-arg TOMCAT_MAJOR=${{ github.event.inputs.tomcat_major }} \
            --build-arg TOMCAT_VERSION=${{ needs.detect-tomcat.outputs.tomcat_version }} \
            --build-arg JAVA_VERSION=${{ github.event.inputs.java_version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest \
            .

      - name: Verify Docker Image
        run: docker images

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest

  # ==========================================
  # UPDATE CONFIGURATION REPOSITORY
  # ==========================================
  update-config:
    name: Update Build Configuration
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - detect-ubi
      - detect-tomcat

    steps:

      - name: Checkout Current Repository
        uses: actions/checkout@v4

      - name: Checkout Configuration Repository
        uses: actions/checkout@v4
        with:
          repository: satishnaga1/configuration
          token: ${{ secrets.GH_PAT }}
          path: configuration

      - name: Run Update Image Script
        run: |
          chmod +x .github/workflows/ubi-java-tomcat-build/git-update/update-image.sh

          .github/workflows/ubi-java-tomcat-build/git-update/update-image.sh
        env:
          UBI_VERSION: ${{ needs.detect-ubi.outputs.ubi_version }}
          JAVA_VERSION: ${{ github.event.inputs.java_version }}
          TOMCAT_MAJOR: ${{ github.event.inputs.tomcat_major }}
          IMAGE_NAME: ${{ github.event.inputs.image_name }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Commit Changes
        run: |
          cd configuration

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add tomcat/build-images.txt

          git commit -m "Updated Docker build image list" || echo "No changes"

      - name: Push Changes
        run: |
          cd configuration

          git remote set-url origin \
            https://x-access-token:${{ secrets.GH_PAT }}@github.com/satishnaga1/configuration.git

          git push origin HEAD:main

  # ==========================================
  # COMPLETE WORKFLOW
  # ==========================================
  complete:
    name: COMPLETE WORKFLOW
    runs-on: ubuntu-latest
    needs: update-config

    steps:
      - name: Pipeline Completed
        run: |
          echo "======================================"
          echo "DOCKER IMAGE SUCCESSFULLY PUSHED"
          echo "======================================"

          echo ""
          echo "Docker Image:"
          echo "${{ secrets.DOCKER_USERNAME }}/${{ github.event.inputs.image_name }}:latest"
